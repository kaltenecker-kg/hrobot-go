              type: string
              format: ipv4
              description: Server main IP address
              example: "123.123.123.123"
            server_ipv6_net:
              type: string
              format: ipv6
              description: Server main IPv6 net address
              example: "2a01:f48:111:4221::"
            server_number:
              type: integer
              description: Server ID
              example: 321
            server_name:
              type: string
              description: Server name
              example: "server1"
            product:
              type: string
              description: Server product name
              example: "DS 3000"
            dc:
              type: string
              description: Data center
              example: "NBG1-DC1"
            traffic:
              type: string
              description: Free traffic quota, 'unlimited' in case of unlimited traffic
              example: "5 TB"
            status:
              type: string
              enum: [ ready, "in process" ]
              description: Server status
              example: "ready"
            cancelled:
              type: boolean
              description: Status of server cancellation
              example: false
            paid_until:
              type: string
              format: date
              description: Paid until date
              example: "2010-09-02"
            ip:
              type: array
              items:
                type: string
                format: ipv4
              description: Array of assigned single IP addresses
              example: [ "123.123.123.123" ]
            subnet:
              type: array
              items:
                type: object
                properties:
                  ip:
                    type: string
                    description: IP address
                    example: "2a01:4f8:111:4221::"
                  mask:
                    type: string
                    description: Subnet mask
                    example: "64"
              nullable: true
              description: Array of assigned subnets
              example:
                - ip: "2a01:4f8:111:4221::"
                  mask: "64"
          required:
            - server_ip
            - server_number
            - server_name
            - product
            - dc
            - traffic
            - status
            - cancelled
            - paid_until
            - ip

