                  type: string
                  format: date
                  description: Start date
                to:
                  type: string
                  format: date
                  description: End date
      responses:
        '200':
          description: Traffic data request successful
        '400':
          $ref: '#/components/responses/InvalidInput'
      x-rate-limit: "100 requests per 1 hour"

  # SSH Keys endpoints
  /key:
    get:
      summary: Get all SSH keys
      description: Query all SSH keys
      operationId: getSSHKeys
      tags:
        - SSH Keys
      responses:
        '200':
          description: SSH keys retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SSHKey'
        '404':
          description: No keys found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-rate-limit: "500 requests per 1 hour"

    post:
      summary: Add SSH key
      description: Add a new SSH key
      operationId: addSSHKey
      tags:
        - SSH Keys
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
